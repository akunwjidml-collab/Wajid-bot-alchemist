name: Jalankan Bot Alchemist H1

on:
  workflow_dispatch: # Biar abang bisa klik tombol manual kapan aja
  schedule:
    - cron: '0 * * * *' # OTOMATIS JALAN SENDIRI SETIAP PERGANTIAN JAM (MENIT 00)

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode Repositori
      uses: actions/checkout@v4

    - name: Siapkan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Lib Pendukung
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Eksekusi Bot
      run: python main.py
