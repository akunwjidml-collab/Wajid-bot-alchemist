name: Jalankan Bot Alchemist

on:
  schedule:
    - cron: '0 * * * *' # Otomatis jalan setiap jam
  workflow_dispatch: # Biar bisa lo klik jalanin manual kapan aja

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode Repo
        uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Lib Pendukung
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Eksekusi Bot
        run: python main.py
